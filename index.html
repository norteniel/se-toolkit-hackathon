<!DOCTYPE html>
<html>
<head>
    <title>PlanDecider</title>
    <style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #1e293b, #0f172a);
        color: white;
        text-align: center;
        padding: 50px;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 20px;
    }

    input {
        padding: 12px;
        width: 300px;
        border-radius: 10px;
        border: none;
        margin-right: 10px;
    }

    button {
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    #explanation {
        margin-top: 10px;
        color: #cbd5f5;
    }

    #history {
        margin-top: 30px;
        font-size: 14px;
        color: #94a3b8;
    }
    </style>
</head>
<body>

<h1>🤖 AI Chooser</h1>

<input id="input" placeholder="pizza, sushi, burger" />
<button onclick="choose()">Choose</button>

<p id="result"></p>
<p id="explanation"></p>

<div id="history"></div>

<script>
async function choose() {
    const value = document.getElementById("input").value;

    const items = value.split(",").map(i => i.trim()).filter(i => i);

    const res = await fetch("https://se-toolkit-hackathon-zg8a.onrender.com/choose", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ items })
    });

    const data = await res.json();

    document.getElementById("result").innerText = "Choice: " + data.result;
    document.getElementById("explanation").innerText = data.explanation || "";

    if (data.history) {
    document.getElementById("history").innerText =
        "History:\n" + data.history.map(h => "- " + h.join(", ")).join("\n");
    }
}
</script>

</body>
</html>
