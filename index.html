<!DOCTYPE html>
<html>
<head>
    <title>PlanDecider</title>
</head>
<body>

<input id="input" placeholder="Введите запрос..." />
<button onclick="choose()">Choose</button>

<p id="result"></p>

<script>
async function choose() {
    const value = document.getElementById("input").value;

    const items = value
        .split(",")
        .map(i => i.trim())
        .filter(i => i.length > 0);

    const res = await fetch("https://se-toolkit-hackathon-zg8a.onrender.com/choose", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ items: items })
    });

    const data = await res.json();
    document.getElementById("result").innerText = JSON.stringify(data);
}
</script>

</body>
</html>
