<!DOCTYPE html>
<html>
<head>
    <title>AI Chooser</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
        }

        #history {
            margin-top: 30px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<h1>🤖 AI Chooser</h1>

<input id="input" placeholder="pizza, sushi, burger" />
<button onclick="choose()">Choose</button>

<p id="result"></p>
<p id="explanation"></p>

<div id="history"></div>

<script>
async function choose() {
    const value = document.getElementById("input").value;

    const items = value.split(",").map(i => i.trim()).filter(i => i);

    const res = await fetch("https://se-toolkit-hackathon-zg8a.onrender.com/choose", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ items })
    });

    const data = await res.json();

    document.getElementById("result").innerText = "Choice: " + data.result;
    document.getElementById("explanation").innerText = data.explanation || "";

    if (data.history) {
        document.getElementById("history").innerText =
            "History: " + JSON.stringify(data.history);
    }
}
</script>

</body>
</html>
